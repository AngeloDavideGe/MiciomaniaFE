<header class="top-navbar">
  <nav>
    <div class="elemento-iniziale">
      <ng-content select="[leftContent]"></ng-content>
    </div>

    <div class="elemento-centrato">
      <ng-content select="[centerContent]"></ng-content>
    </div>

    <div class="menu elemento-finale">
      @for (pulsante of pulsanti; track pulsante.id) {
        <a
          [class.active]="pulsante.id === selectPulsante()"
          (click)="clickPulsante(pulsante)"
        >
          <div class="icon">
            <i [class]="pulsante.icon"></i>
          </div>

          <span>{{ pulsante.text }}</span>
        </a>
      }
      <ng-content select="[rightContent]"></ng-content>
    </div>
  </nav>
</header>
