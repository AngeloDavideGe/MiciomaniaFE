<section
  class="chat-wrapper position-fixed end-0 me-1"
  [ngStyle]="{ bottom: bottomValue }"
>
  @if (chatAperta()) {
    <div
      class="chat-container"
      [ngClass]="{
        'full-screen-chat': fullscreen(),
        'chat-list': !fullscreen(),
      }"
    >
      @if (spinner()) {
        <div class="spinner-overlay">
          <div class="whatsapp-spinner-indy-small"></div>
        </div>
      } @else {
        @if (!currentChat()) {
          <header id="ChatHeader" class="p-3">
            <h2>Miciomania Chat</h2>

            <div class="header-actions">
              <i
                class="pc-only"
                [ngClass]="
                  fullscreen() ? 'bi bi-fullscreen-exit' : 'bi bi-fullscreen'
                "
                (click)="fullscreen.set(!fullscreen())"
              ></i>

              <i class="bi bi-x icon-size" (click)="chatAperta.set(false)"></i>
            </div>
          </header>

          <app-chat-all
            [allGruppi]="allGruppi"
            [allGruppiRecord]="allGruppiRecord()"
            [fullscreen]="fullscreen()"
            (apriGruppo)="apriGruppo($event)"
          />
        } @else {
          <header id="ChatHeader" class="p-3">
            <i
              class="bi bi-arrow-left fs-3"
              (click)="currentChat.set(null)"
            ></i>

            <h2>
              {{ currentChat()?.nome || "N.B." }}
            </h2>

            <div class="header-actions">
              <i
                class="pc-only"
                [ngClass]="
                  fullscreen() ? 'bi bi-fullscreen-exit' : 'bi bi-fullscreen'
                "
                (click)="fullscreen.set(!fullscreen())"
              ></i>

              <i class="bi bi-x icon-size" (click)="currentChat.set(null)"></i>
            </div>
          </header>

          <app-chat-group
            [chatId]="currentChat()!.id"
            [messaggi]="currentMessaggi()"
            [recordIdPic]="recordIdPic"
            [userId]="userId"
            (inviaMessaggio)="inviaMessaggio.emit($event)"
            (modificaMessaggio)="modificaMessaggio.emit($event)"
            (eliminaMessaggio)="eliminaMessaggio.emit($event)"
          />
        }
      }
    </div>
  } @else {
    <div class="chat-button" (click)="chatAperta.set(true)">
      <div class="chat-icon">
        <i class="bi bi-chat-dots-fill"></i>
      </div>

      <span class="chat-text"> Visualizza chat&nbsp;Miciomane </span>
    </div>
  }
</section>
