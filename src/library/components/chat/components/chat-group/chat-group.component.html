<div
  id="ChatContainer"
  (click)="dropdownAperta.set(null)"
  [style]="fullscreen() ? 'height: calc(100% - 4.9rem);' : ''"
>
  <div #chatMessages class="chat-messages">
    @for (message of messages(); track message.id) {
      <!-- Separator -->
      @if (message.separator) {
        <div
          #daySeparator
          class="date-separator"
          [attr.data-date]="message.created_at"
        >
          <span>{{ message.created_at | date: "dd/MM/yyyy" }}</span>
        </div>
      }

      <app-messaggio
        [messageComp]="{
          message: message,
          name: message.sender,
          replySender: risposta()?.idUser || '',
          replyText: risposta()?.content || '',
          urlPic: recordIdPic[message.sender]?.pic || '',
          class2: message.sender === userId ? 'sent' : 'received',
        }"
        [dropdownAperta]="dropdownAperta()"
        (openDropdown)="changeDropdown($event, message)"
      ></app-messaggio>
    }
  </div>

  <app-chat-input
    #chatInput
    [idUtente]="userId"
    [risposta]="risposta()"
    [modifica]="modifica()"
    (sendMessaggio)="sendOrEditMessaggio($event)"
    (closeRisposta)="risposta.set(null)"
    (closeModifica)="modifica.set(null)"
  ></app-chat-input>
</div>
