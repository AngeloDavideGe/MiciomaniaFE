<app-custom-navbar [altriBottoni]="pulsanti"></app-custom-navbar>

@if (euService.mangaParodia()) {
  <section id="MangaMiciomania">
    <app-custom-scroll
      [titolo]="mmicioLang.titoloScrollGiu"
      [icona]="'bi bi-arrow-down'"
      [nomeIcona]="mmicioLang.iconaScrollGiu"
      [idComponent]="'MangaUtente'"
      [lunghezzaFiltro]="mangaMiciomania().length"
    ></app-custom-scroll>

    <app-card-custom
      [elems]="mangaMiciomania"
      [classBody]="'manga-class'"
      [tipoBottone]="'Download'"
      [altezzaImg]="'20rem'"
      [tipoSlice]="'page'"
    ></app-card-custom>
  </section>

  <section id="MangaUtente" class="mt-3">
    <app-custom-scroll
      [titolo]="mmicioLang.titoloScrollSu"
      [icona]="'bi bi-arrow-up'"
      [nomeIcona]="mmicioLang.iconaScrollSu"
      [lunghezzaFiltro]="mangaUtente().length"
    ></app-custom-scroll>

    <app-card-custom
      [elems]="mangaUtente"
      [classBody]="'manga-class'"
      [tipoBottone]="'Download'"
      [altezzaImg]="'20rem'"
      [tipoSlice]="'page'"
    ></app-card-custom>
  </section>
} @else {
  <app-spinner [mt]="'10rem'"></app-spinner>
}
