<app-custom-navbar [altriBottoni]="pulsanti"></app-custom-navbar>

@if (sezioni().length > 0) {
  <app-scroll-indy [sezioni]="sezioni()">
    <div primo>
      @if (mangaMiciomania().length > 0) {
        <app-card-indy
          [elems]="mangaMiciomania"
          [classBody]="'manga-class'"
          [tipoBottone]="'Download'"
          [altezzaImg]="'20rem'"
          [tipoSlice]="'page'"
        ></app-card-indy>
      }
    </div>

    <div secondo>
      @if (mangaUtente().length > 0) {
        <app-card-indy
          [elems]="mangaUtente"
          [classBody]="'manga-class'"
          [tipoBottone]="'Download'"
          [altezzaImg]="'20rem'"
          [tipoSlice]="'page'"
        ></app-card-indy>
      } @else {
        <div class="elementi-colonna">
          <h3>Non ci sono Manga in questa sezione</h3>
          <p>Vai su invia Proposta e inizia a mandarne una</p>
        </div>
      }
    </div>
  </app-scroll-indy>
} @else {
  <app-spinner-indy [mt]="'10rem'"></app-spinner-indy>
}
