@if (isManga$ | async) {
  <app-custom-navbar [altriBottoni]="pulsanti"></app-custom-navbar>

  @if (mangaService.listaManga().length > 0) {
    <app-filtri-manga
      [filterSelect]="filterSelect"
      (onGenreChange)="filterSelect.genere.set($event)"
    ></app-filtri-manga>

    <app-tabs-indy [tabs]="tabs"></app-tabs-indy>

    <div
      class="grid-card-layout mt-4 px-2"
      style="--card-width: 15rem; --card-position: start"
    >
      @for (manga of filtri.searchElems(); track manga.id) {
        <div class="d-flex" style="padding: 0.2rem">
          <app-card-manga
            [manga]="manga"
            [preferito]="mangaPreferiti[manga.id]"
            (selezionaOpera)="selezionaOpera(manga.path)"
          ></app-card-manga>
        </div>
      }
    </div>
  }
} @else {
  <app-spinner-indy [mt]="'10rem'"></app-spinner-indy>
}

<router-outlet></router-outlet>
