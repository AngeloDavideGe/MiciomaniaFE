@if (isGames$ | async) {
  <div class="container" style="max-width: 86rem">
    @if (showDetails()) {
      <app-punteggi-games
        [punteggioPersonale]="punteggioPersonale"
        [squadre]="squadre()"
      ></app-punteggi-games>
    }

    <div class="grid-card-layout mt-3">
      @for (gioco of gamesConstant; track gioco.nome) {
        <app-card-custom
          [link]="gioco.linkImg"
          [titolo]="gioco.nome"
          [titoloBottone]="'Gioca'"
          [classBody]="'games-class'"
          [altezzaImg]="'15rem'"
          (clickBotton)="router.navigate(['games/' + gioco.routerLink])"
        >
          <p descrizioneContent>{{ gioco.descrizione }}</p>
        </app-card-custom>
      }
    </div>
  </div>
}

<router-outlet></router-outlet>
