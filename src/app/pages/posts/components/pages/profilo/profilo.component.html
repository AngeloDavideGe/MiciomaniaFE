@if (utenteCaricato) {
  <div class="container">
    <div class="row">
      <div class="col-md-8 offset-md-2">
        <app-custom-navbar
          [tornaIndietro]="tornaIndietroPath"
        ></app-custom-navbar>

        <app-card-profilo
          [profiloLang]="profiloLang"
          [profilo]="profilo"
          [profiloPersonale]="profiloPersonale"
          [socialArray]="socialArray"
          [spinnerTemplate]="spinnerTemplate"
          (modaleAperta)="modaleAperta = $event"
        ></app-card-profilo>

        <app-sezione-tweet
          [profilo]="profilo"
          [profiloPersonale]="profiloPersonale"
          [spinnerTemplate]="spinnerTemplate"
          (eliminaTweet)="eliminaTweet($event)"
          (modaleAperta)="modaleAperta = $event"
        ></app-sezione-tweet>
      </div>
    </div>
  </div>

  @switch (modaleAperta) {
    @case ("new-tweet") {
      <app-new-tweet
        [profiloLang]="profiloLang"
        [idUtente]="profilo.user.id!"
        (chiudi)="modaleAperta = ''"
      ></app-new-tweet>
    }

    @case ("edit-profilo") {
      <app-edit-profilo
        [profiloLang]="profiloLang"
        [user]="profilo.user"
        (chiudi)="modaleAperta = ''; loadSocial()"
      ></app-edit-profilo>
    }

    @case ("change-pic") {
      <app-change-pic-custom
        [nome]="'Profilo'"
        (chiudi)="modaleAperta = ''"
        (conferma)="onUpload($event)"
      >
      </app-change-pic-custom>
    }
  }
}

@if (errorHttp()) {
  <app-error-http></app-error-http>
}

<ng-template #spinnerTemplate>
  <app-spinner [mt]="'10rem'"></app-spinner>
</ng-template>
