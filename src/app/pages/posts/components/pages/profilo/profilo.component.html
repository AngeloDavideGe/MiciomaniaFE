@if (utenteCaricato()) {
  <div class="container">
    <div class="row">
      <div class="col-md-8 offset-md-2">
        <app-custom-navbar
          [tornaIndietro]="tornaIndietroPath"
        ></app-custom-navbar>

        <app-card-profilo
          [profiloLang]="profiloLang"
          [profilo]="profilo"
          [profiloPersonale]="profiloPersonale"
          [socialArray]="socialArray"
          [spinnerTemplate]="spinnerTemplate"
          (modaleAperta)="modaleAperta = $event"
        ></app-card-profilo>

        <app-sezione-tweet
          [profilo]="profilo"
          [profiloPersonale]="profiloPersonale"
          [spinnerTemplate]="spinnerTemplate"
          (eliminaTweet)="eliminaTweet($event)"
          (modaleAperta)="modaleAperta = $event"
        ></app-sezione-tweet>
      </div>
    </div>
  </div>

  @switch (modaleAperta) {
    @case ("new-tweet") {
      <app-modal-custom
        [title]="profiloLang.nuovoTweet"
        (close)="modaleAperta = ''"
      >
        <div bodyModal>
          <app-form-custom
            [strutturaForm]="newTweetForm"
            (invioDati)="inviaTweet($event)"
          >
          </app-form-custom>
        </div>
      </app-modal-custom>
    }

    @case ("edit-profilo") {
      <app-modal-custom
        [title]="profiloLang.modificaProfilo"
        (close)="modaleAperta = ''; loadSocial()"
      >
        <div bodyModal>
          <div tabContent>
            <tab-social-profilo
              [profiloLang]="profiloLang"
              [user]="profilo.user"
            ></tab-social-profilo>
          </div>
        </div>
      </app-modal-custom>
    }

    @case ("change-pic") {
      <app-modal-custom
        [title]="'Cambia Immagine'"
        [subtitle]="'Vietate foto di Colonvv'"
        [width]="'sm'"
        [showFooter]="false"
        (close)="modaleAperta = ''; this.newProfilePic.set(null)"
      >
        <div bodyModal>
          <app-form-custom
            [strutturaForm]="changePicForm"
            [visualizzaPulsanti]="false"
            (subscribeForm)="this.newProfilePic.set($event.imgProfilo)"
          ></app-form-custom>

          <button
            class="btn btn-primary w-100"
            style="border-radius: 30px; font-weight: 500"
            [disabled]="!this.newProfilePic()"
            (click)="onUpload(this.newProfilePic())"
          >
            {{ "Carica Immagine" }}
          </button>
        </div>
      </app-modal-custom>
    }
  }
}

<ng-template #spinnerTemplate>
  <app-spinner [mt]="'10rem'"></app-spinner>
</ng-template>
