@if (utenteCaricato) {
  <div class="container">
    <div class="row">
      <div class="col-md-8 offset-md-2">
        <app-custom-navbar
          [tornaIndietro]="tornaIndietroPath"
        ></app-custom-navbar>

        <app-card-profilo
          [profiloLang]="profiloLang"
          [profilo]="profilo"
          [profiloPersonale]="profiloPersonale"
          [socialArray]="socialArray"
          [spinnerTemplate]="spinnerTemplate"
          (modaleAperta)="modaleAperta = $event"
        ></app-card-profilo>

        <app-sezione-tweet
          [profilo]="profilo"
          [profiloPersonale]="profiloPersonale"
          [spinnerTemplate]="spinnerTemplate"
          (eliminaTweet)="eliminaTweet($event)"
          (modaleAperta)="modaleAperta = $event"
        ></app-sezione-tweet>
      </div>
    </div>
  </div>

  @switch (modaleAperta) {
    @case ("new-tweet") {
      <app-modal-custom
        [title]="profiloLang.nuovoTweet"
        (close)="modaleAperta = ''"
      >
        <div bodyModal>
          <app-form-custom
            [strutturaForm]="newTweetForm"
            (invioDati)="inviaTweet($event)"
          >
          </app-form-custom>
        </div>
      </app-modal-custom>
    }

    @case ("edit-profilo") {
      <app-modal-custom
        [title]="profiloLang.modificaProfilo"
        (close)="modaleAperta = ''; loadSocial()"
      >
        <div bodyModal>
          <app-tabs-custom [tabs]="tabs" (clickTab)="selectTab.set($event)">
            <div tabContent>
              @switch (selectTab()) {
                @case ("info") {
                  <tab-info-profilo
                    [profiloLang]="profiloLang"
                    [user]="profilo.user"
                  ></tab-info-profilo>
                }
                @case ("social") {
                  <tab-social-profilo
                    [profiloLang]="profiloLang"
                    [user]="profilo.user"
                  ></tab-social-profilo>
                }
              }
            </div>
          </app-tabs-custom>
        </div>
      </app-modal-custom>
    }

    @case ("change-pic") {
      <app-change-pic-custom
        [nome]="'Profilo'"
        (chiudi)="modaleAperta = ''"
        (conferma)="onUpload($event)"
      >
      </app-change-pic-custom>
    }
  }
}

@if (errorHttp()) {
  <app-error-http></app-error-http>
}

<ng-template #spinnerTemplate>
  <app-spinner [mt]="'10rem'"></app-spinner>
</ng-template>
