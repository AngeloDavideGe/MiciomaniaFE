@if (isHome$ | async) {
  <app-custom-navbar [viewTornaIndietro]="false">
    <div leftContent>
      <app-toggle-custom
        [tipo]="'single'"
        [imgIcona]="user.credenziali.profilePic || imgDefault"
        [menuOpen]="compAperto.profili"
        [toggleStyles]="profiliStyle"
        [toggleMenus]="toggleProfili()"
        (aperturaMenu)="switchCompAperto(enumCompAperto.profili, $event)"
      >
        <div downContent>
          <div
            class="add-account-item"
            (click)="router.navigate(['/auth/new-login'])"
          >
            <div class="add-account-icon">
              <i class="bi bi-plus-circle-fill"></i>
            </div>
            <div class="add-account-text">
              <span>Aggiungi account</span>
            </div>
          </div>

          <div class="logout-item" (click)="logoutAll()">
            <div class="logout-text">
              <span>Esci da tutti gli account</span>
            </div>
          </div>
        </div>
      </app-toggle-custom>
    </div>

    <div rightContent>
      <div class="elementi-laterali gap-2">
        <app-toggle-custom
          [icona]="'bi bi-bell'"
          [tipo]="'single'"
          [menuOpen]="compAperto.notifiche"
          [toggleStyles]="notificheStyle"
          [toggleMenus]="toggleNotifiche()"
          (aperturaMenu)="switchCompAperto(enumCompAperto.notifiche, $event)"
        >
        </app-toggle-custom>

        <app-toggle-custom
          [menuOpen]="compAperto.menuBar"
          [toggleMenus]="toggleMenus()"
          (aperturaMenu)="switchCompAperto(enumCompAperto.menuBar, $event)"
        >
        </app-toggle-custom>
      </div>
    </div>
  </app-custom-navbar>

  @if (compAperto.cursore()) {
    <app-cursore class="pc-only"></app-cursore>
  }

  <div class="container">
    <app-card-indy
      [elems]="cardsHome"
      [arrayPags]="pagineHome"
      [tipoSlice]="'single'"
      [titoloLista]="'Home Miciomania'"
    ></app-card-indy>
  </div>

  <app-social-link></app-social-link>

  <footer class="text-center py-4">
    <p>&copy; 2026 MiciomaniWeb. Tutti i diritti riservati.</p>
  </footer>
}

<router-outlet></router-outlet>
