@if (isHome$ | async) {
  <app-custom-navbar [viewTornaIndietro]="false">
    <div leftContent>
      <app-user-active
        [homeLang]="homeLang()"
        [user]="user"
        [inizialiUser]="inizialiUser"
        [profiliOpen]="profiloAperto"
        (profiloAperto)="
          $event ? menuBarAperta.set(false) : null;
          $event ? cursoreAperto.set(false) : null
        "
      ></app-user-active>
    </div>

    <div rightContent>
      <app-home-toggle
        [homeLang]="homeLang()"
        [credenziali]="user.credenziali"
        [inizialiUser]="inizialiUser"
        [menuOpen]="menuBarAperta"
        (aperturaMenu)="
          $event ? profiloAperto.set(false) : null;
          $event ? cursoreAperto.set(false) : null
        "
      >
        <div impostazioniContent style="margin-left: 1rem">
          <app-menu-impostazioni
            [homeLang]="homeLang()"
            [user]="user"
            (cursore)="
              cursoreAperto.set(!cursoreAperto());
              cursoreAperto() ? menuBarAperta.set(false) : null;
              cursoreAperto() ? profiloAperto.set(false) : null
            "
          >
          </app-menu-impostazioni>
        </div>

        <div profiliContent style="margin-left: 1rem">
          <app-menu-profili
            [homeLang]="homeLang()"
            [user]="user"
            (logout)="logout()"
          ></app-menu-profili>
        </div>
      </app-home-toggle>
    </div>
  </app-custom-navbar>

  @if (cursoreAperto()) {
    <app-cursore class="pc-only" [homeLang]="homeLang()"></app-cursore>
  }

  <app-carousel-home (canzone)="controlloPunteggio()"></app-carousel-home>

  <app-social-link></app-social-link>

  <footer class="text-center py-4">
    <p>&copy; 2026 MiciomaniWeb. Tutti i diritti riservati.</p>
  </footer>
}

<router-outlet></router-outlet>
