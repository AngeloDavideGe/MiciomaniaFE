@if (isHome$ | async) {
  <app-custom-navbar [viewTornaIndietro]="false">
    <div leftContent>
      <app-user-active
        [user]="user"
        [inizialiUser]="inizialiUser"
        [profiliOpen]="compAperto.profili"
        (profiloAperto)="switchCompAperto(enumCompAperto.profili, $event)"
      ></app-user-active>
    </div>

    <div rightContent>
      <div class="elementi-laterali gap-2">
        <app-toggle-custom
          [icona]="'bi bi-bell'"
          [tipo]="'single'"
          [menuOpen]="compAperto.notifiche"
          [toggleStyles]="notificheStyle"
          [toggleMenus]="toggleNotifiche()"
          (aperturaMenu)="switchCompAperto(enumCompAperto.notifiche, $event)"
        >
        </app-toggle-custom>

        <app-toggle-custom
          [menuOpen]="compAperto.menuBar"
          [toggleMenus]="toggleMenus()"
          (aperturaMenu)="switchCompAperto(enumCompAperto.menuBar, $event)"
        >
        </app-toggle-custom>
      </div>
    </div>
  </app-custom-navbar>

  @if (compAperto.cursore()) {
    <app-cursore class="pc-only"></app-cursore>
  }

  <div class="container">
    <app-card-custom
      [elems]="cardsHome"
      [arrayPags]="pagineHome"
      [tipoSlice]="'single'"
      [titoloLista]="'Home Miciomania'"
    ></app-card-custom>
  </div>

  <app-social-link></app-social-link>

  <footer class="text-center py-4">
    <p>&copy; 2026 MiciomaniWeb. Tutti i diritti riservati.</p>
  </footer>
}

<router-outlet></router-outlet>
