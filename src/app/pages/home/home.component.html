@if (isHome$ | async) {
  <app-navbar-indy>
    <div rightContent>
      <div class="elementi-laterali gap-3">
        <app-toggle-indy
          [icona]="'bi bi-bell'"
          [titolo]="'Notifiche'"
          [tipo]="'single'"
          [toggleMenus]="notificheToggle()"
          [toggleStyles]="{ width: '20rem', height: '30rem' }"
          [(menuOpen)]="menuOpen"
        />
        <app-toggle-indy
          [icona]="'bi bi-gear'"
          [titolo]="'Impostazioni'"
          [toggleMenus]="impostazioniToggle"
          [toggleStyles]="{ width: '20rem' }"
          [(menuOpen)]="menuOpen"
        />
      </div>
    </div>
  </app-navbar-indy>

  <app-container-micio>
    <app-descrizione-micio
      [titolo]="'Benvenuto su Miciomania'"
      [descrizione]="
        'Il posto perfetto per leggere manga, ascoltare musica parodia, giocare con i sentimenti e far piangere Sirius.'
      "
      [immagine]="
        'https://images.unsplash.com/photo-1515879218367-8466d910aaa4'
      "
    />
  </app-container-micio>

  <section class="card-section">
    <app-card-indy
      [elems]="cardsHome"
      [titoloLista]="'✨​ Cosa vuoi fare oggi?'"
      [tipoSlice]="'single'"
      [altezzaImg]="'13rem'"
      [cardPosition]="'start'"
    />
  </section>

  <app-social-link></app-social-link>
  <app-footer></app-footer>
}

<router-outlet></router-outlet>
