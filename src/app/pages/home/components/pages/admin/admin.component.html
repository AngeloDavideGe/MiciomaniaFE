<app-custom-navbar></app-custom-navbar>

@if (loadedAdmin()) {
  <app-griglia-admin
    [adminLang]="adminLang"
    [user]="user"
    [userMapByRuolo]="userMapByRuolo"
    (eliminaRuolo)="eliminaRuolo($event)"
    (modificaRuolo)="modificaRuolo($event)"
  ></app-griglia-admin>
} @else {
  <app-spinner [mt]="'10rem'"></app-spinner>
}

@if (editAdmin()) {
  <app-edit-admin
    [adminLang]="adminLang"
    [userEdit]="userEdit"
    (chiudiModale)="editAdmin.set(false)"
    (ruoloModificato)="ruoloModificato($event)"
  ></app-edit-admin>
}
