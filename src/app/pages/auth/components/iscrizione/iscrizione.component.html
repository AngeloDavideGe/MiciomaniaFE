<app-tabs-custom
  [tabs]="tabs"
  [tipo]="'wizard'"
  [disableNext]="disableNext()"
  (clickTab)="currentStep.set($event)"
>
  <div wizardContent>
    @switch (currentStep()) {
      @case ("1") {
        <app-step1 [team]="squadreInGame()"></app-step1>
      }
      @case ("2") {
        <app-step2
          (formValido)="formValido.set($event)"
          [team]="team()"
        ></app-step2>
      }
      @case ("3") {
        <app-step3
          (lineeGuidaEvent)="lineeGuidaAccettate.set($event)"
        ></app-step3>
      }
    }
  </div>
</app-tabs-custom>
