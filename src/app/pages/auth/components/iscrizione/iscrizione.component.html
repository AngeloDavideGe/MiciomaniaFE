<app-tabs-custom
  [tabs]="tabs"
  [tipo]="'wizard'"
  [disableNext]="disableNext()"
  (prev)="prevStep($event)"
  (next)="nextStep($event)"
>
  <div wizardContent>
    @if (squadreInGame().length === 0) {
      <app-spinner></app-spinner>
    } @else {
      @switch (currentStep()) {
        @case ("1") {
          <app-step1 [team]="squadreInGame()"></app-step1>
        }
        @case ("2") {
          <app-multi-form
            [strutturaForm]="strutturaForm()"
            (formValido)="formValido.set($event)"
            (subscribeForm)="aggiornaUserForm($event)"
            [visualizzaPulsanti]="false"
          ></app-multi-form>
        }
        @case ("3") {
          <app-step3
            (lineeGuidaEvent)="lineeGuidaAccettate.set($event)"
          ></app-step3>
        }
      }
    }
  </div>
</app-tabs-custom>
